<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Items - UniBuy</title>
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/swipe.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="menu-logo">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>

            <h1>UniBuy</h1>
        </div>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">

        <a href="index.html">
            <i class="fas fa-home"></i> Home
        </a>

        <a href="sell.html">
            <i class="fas fa-plus-circle"></i> Sell Item
        </a>

        <a href="mylistings.html">
            <i class="fas fa-box"></i> My Listings
        </a>

        <a href="messages.html">
            <i class="fas fa-comments"></i> Messages
        </a>

        <a href="saved.html">
            <i class="fas fa-heart"></i> Saved Items
        </a>

        <a href="universities.html">
            <i class="fas fa-school"></i> Universities
        </a>

        <a href="settings.html">
            <i class="fas fa-cog"></i> Settings
        </a>

        <a href="contact.html">
            <i class="fas fa-envelope"></i> Contact Us
        </a>

        <a href="terms.html">
            <i class="fas fa-file-contract"></i> Terms
        </a>

        <a href="login.html" id="authLink">
            <i class="fas fa-sign-in-alt"></i> Login
        </a>

    </aside>

    <!-- Main -->
    <main>

        <h2 class="page-heading">❤️ Saved Items</h2>

        <section class="product-grid" id="savedGrid">
            <!-- Cards rendered here by js/products.js's renderProductGrid() -->
        </section>

        <p id="savedEmpty" class="empty-state hidden">
            Nothing saved yet. Tap the heart on any item — from the
            home grid or the full-screen viewer — to save it here.
        </p>

    </main>

    <!-- Full-screen swipe viewer (reused so saved items open the same way) -->
    <div id="swipeViewer" class="swipe-viewer hidden" aria-hidden="true">
        <button class="swipe-close" id="swipeClose" aria-label="Close">
            <i class="fas fa-xmark"></i>
        </button>
        <div class="swipe-track" id="swipeTrack"></div>
    </div>

    <script src="js/landing.js"></script>
    <script src="js/swipe.js"></script>
    <script type="module" src="js/products.js"></script>
    <script src="js/saved.js"></script>
    <script>
        async function renderSavedPage() {
            const savedIds = window.UniBuySaved.getSavedIds();
            const allProducts = await window.UniBuyProducts.getAll();
            const savedProducts = allProducts.filter(function (p) {
                return savedIds.indexOf(p.id) !== -1;
            });

            const grid = document.getElementById("savedGrid");
            const emptyState = document.getElementById("savedEmpty");

            if (savedProducts.length === 0) {
                if (grid) grid.innerHTML = "";
                if (emptyState) emptyState.classList.remove("hidden");
                return;
            }

            if (emptyState) emptyState.classList.add("hidden");
            window.UniBuyProducts.renderGrid(savedProducts, "savedGrid");
        }

        document.addEventListener("DOMContentLoaded", renderSavedPage);

        // Keep this page in sync if something gets unsaved from
        // inside the swipe viewer while we're looking at this list.
        window.addEventListener("unibuy:saved-changed", renderSavedPage);
    </script>

</body>
</html>
