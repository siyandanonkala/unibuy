<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBuy</title>
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="menu-logo">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>

            <h1>UniBuy</h1>
        </div>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">

        <a href="index.html">
            <i class="fas fa-home"></i> Home
        </a>

        <a href="sell.html">
            <i class="fas fa-plus-circle"></i> Sell Item
        </a>

        <a href="mylistings.html">
            <i class="fas fa-box"></i> My Listings
        </a>

        <a href="messages.html">
            <i class="fas fa-comments"></i> Messages
        </a>

        <a href="saved.html">
            <i class="fas fa-heart"></i> Saved Items
        </a>

        <a href="universities.html">
            <i class="fas fa-school"></i> Universities
        </a>

        <a href="settings.html">
            <i class="fas fa-cog"></i> Settings
        </a>

        <a href="contact.html">
            <i class="fas fa-envelope"></i> Contact Us
        </a>

        <a href="terms.html">
            <i class="fas fa-file-contract"></i> Terms
        </a>

        <a href="login.html">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>

    </aside>

    <!-- Main -->
<main>

    <!-- Search -->
    <div class="search-box">
        <input type="text" placeholder="Search products...">
    </div>

    <!-- Products -->
    <section class="product-grid" id="productGrid">

        <div class="product-card">

            <img src="images/laptop.jpg" alt="Laptop">

            <div class="card-body">

                <h3 class="product-name">HP Laptop</h3>

                <p class="product-price">R4 500</p>

                <p class="product-location">
                    <i class="fas fa-location-dot"></i>
                    Alice Campus
                </p>

            </div>

        </div>

        <div class="product-card">

            <img src="images/phone.jpg" alt="Phone">

            <div class="card-body">

                <h3 class="product-name">iPhone 12</h3>

                <p class="product-price">R5 900</p>

                <p class="product-location">
                    <i class="fas fa-location-dot"></i>
                    Fort Hare
                </p>

            </div>

        </div>

    </section>

</main>

    <script src="js/landing.js"></script>

</body>
</html>
