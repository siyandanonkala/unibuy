<!--
    Conversation list — this markup is the target shape for real data.
    Once seller identity is tied to a Firebase Auth uid (see the note
    in app.js), each item here becomes:

    <a class="conversation-item" href="chat.html?id=CONVERSATION_ID">
        <div class="conversation-avatar">T</div>
        <div class="conversation-info">
            <h3>Thabo M.</h3>
            <p>Is the laptop still available?</p>
        </div>
        <span class="conversation-time">2h</span>
    </a>

    For now there's nothing to populate it with, so the empty state
    below is what actually renders.
-->
<div class="conversation-list" id="conversationList"></div>

<p class="empty-state" id="messagesEmpty">
    No conversations yet.<br>
    Tap "Chat with Seller" on any item to start one — messaging is
    coming soon.
</p>
