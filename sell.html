<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Item - UniBuy</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="navbar">
    <button class="menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>
    <span class="navbar-brand">UniBuy</span>
    <span style="width:24px"></span>
</div>

<aside id="sidebar" class="sidebar">
    <button class="close-btn" onclick="toggleSidebar()">
        <i class="fas fa-times"></i>
    </button>

    <div id="sidebarUser" style="padding:15px 20px;"></div>

    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="sell.html"><i class="fas fa-plus-circle"></i> Sell Item</a>
    <a href="mylistings.html"><i class="fas fa-box"></i> My Listings</a>
    <a href="messages.html"><i class="fas fa-comments"></i> Messages</a>
    <a href="saved.html"><i class="fas fa-heart"></i> Saved Items</a>
    <a href="universities.html"><i class="fas fa-school"></i> Universities</a>
    <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
    <a href="contact.html"><i class="fas fa-envelope"></i> Contact Us</a>
    <a href="terms.html"><i class="fas fa-file-contract"></i> Terms</a>
    <a href="login.html" id="loginLink"><i class="fas fa-sign-out-alt"></i> Logout</a>
</aside>

<div class="product-form-container">
    <h1>📦 Sell an Item</h1>

    <form id="productForm">

        <input type="text" id="productName" placeholder="Product Name" required>

        <input type="number" id="productPrice" placeholder="Price (R)" min="0" required>

        <select id="productCategory">
            <option value="">Select a category</option>
            <option value="electronics">Electronics</option>
            <option value="furniture">Furniture</option>
            <option value="books">Books</option>
            <option value="appliances">Appliances</option>
            <option value="transport">Transport</option>
            <option value="other">Other</option>
        </select>

        <input type="text" id="productLocation" placeholder="Location (e.g. Alice Campus)">

        <textarea id="productDescription" placeholder="Describe your item..."></textarea>

        <div class="product-image-upload">
            <label for="productImage">Product Photo</label>
            <input type="file" id="productImage" accept="image/*">
        </div>

        <button type="submit">Post Item</button>

    </form>
</div>

<script src="js/ui.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
